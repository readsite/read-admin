<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="img/favicon.png" rel="icon">
    <title>Read.管理后台 | 内容发布中心</title>
    <link href="font/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 登录面板 -->
<div id="loginPanel" class="login-panel">
    <div class="login-card">
        <div class="login-brand">
            <div class="login-logo"><i class="ri-book-open-line"></i></div>
            <h2>Read. 管理后台</h2>
            <p class="login-sub">内容发布管理中心</p>
        </div>
        <form id="loginForm">
            <div class="login-input-group">
                <i class="ri-user-3-line"></i>
                <input type="text" id="username" placeholder="用户名" autocomplete="off">
            </div>
            <div class="login-input-group">
                <i class="ri-lock-line"></i>
                <input type="password" id="password" placeholder="密码" autocomplete="off">
                <i class="ri-eye-off-line toggle-password" id="togglePassword"></i>
            </div>
            <button type="submit" class="login-btn">
                <i class="ri-login-box-line"></i> 登录系统
            </button>
        </form>
    </div>
</div>

<!-- 卡片菜单弹窗 -->
<div id="cardMenuPopup" class="card-menu-popup" style="display: none;">
    <div class="card-menu-item" data-action="edit">
        <i class="ri-edit-line"></i> 编辑
    </div>
    <div class="card-menu-item" data-action="delete">
        <i class="ri-delete-bin-line"></i> 删除
    </div>
</div>

<!-- 主应用容器 -->
<div id="appContainer" class="app-container" style="display: none;">
    <div class="app-layout">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-logo"><i class="ri-book-open-line"></i></div>
                <div class="sidebar-brand-text">
                    <span class="sidebar-brand-name">Read.</span>
                    <span class="sidebar-brand-sub">管理后台</span>
                </div>
                <button class="sidebar-close" id="sidebarCloseBtn"><i class="ri-close-line"></i></button>
            </div>
                                              <!-- 桌面端折叠按钮 -->
                <button class="sidebar-collapse-toggle" id="collapseSidebarBtn" title="折叠侧边栏">
                    <i class="ri-sidebar-fold-line"></i>
                </button>
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">内容管理</div>
                <div class="sidebar-item" id="sidebarPublished" title="已发布内容">
                    <i class="ri-checkbox-circle-line"></i> <span>已发布内容</span>
                </div>
                <div class="sidebar-item" id="sidebarScheduled" title="定时任务">
                    <i class="ri-time-line"></i> <span>定时任务</span>
                </div>
                <div class="sidebar-item" id="sidebarDraft" title="草稿箱">
                    <i class="ri-draft-line"></i> <span>草稿箱</span>
                </div>
                <div class="sidebar-section-title">运营管理</div>
                <div class="sidebar-item" id="sidebarComments" title="评论管理">
                    <i class="ri-chat-3-line"></i> <span>评论管理</span>
                </div>
                <div class="sidebar-item" id="sidebarReports" title="举报管理">
                    <i class="ri-alert-line"></i> <span>举报管理</span>
                </div>
                <div class="sidebar-item" id="sidebarTrash" title="回收站">
                    <i class="ri-delete-bin-7-line"></i> <span>回收站</span>
                    <span class="sidebar-badge" id="sidebarTrashBadge" style="display:none;">0</span>
                </div>
            </nav>
            <div class="sidebar-footer">

                <div class="sidebar-item" id="sidebarLogout" title="退出登录">
                    <i class="ri-logout-box-line"></i> <span>退出登录</span>
                </div>
            </div>
        </aside>

        <!-- 侧边栏遮罩（移动端） -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- 右侧主区域 -->
        <div class="main-wrapper">
            <!-- 顶部栏 -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="topbar-menu-btn" id="mobileMenuBtn">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="topbar-title-group">
                        <h1 class="topbar-title" id="mainHeaderTitle">已发布内容</h1>
                        <span class="topbar-badge" id="trashPanelCount" style="display:none;">0 项</span>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="topbar-btn topbar-btn-primary" id="newPostBtn">
                        <i class="ri-add-line"></i> <span class="topbar-btn-text">新建发布</span>
                    </button>
                </div>
            </header>

            <!-- 主内容区 -->
            <main class="main-content">
                <!-- 内容列表容器 -->
                <div id="postList" class="post-list"></div>
                <div id="scheduledList" class="post-list" style="display: none;"></div>
                <div id="draftList" class="post-list" style="display: none;"></div>

                <!-- 评论管理面板 -->
<div id="commentsPanel" class="content-panel" style="display: none;">
    <div id="commentsList" class="panel-list">
        <div class="empty-message">加载中...</div>
    </div>
</div>
                <!-- 举报管理面板 -->
<div id="reportsPanel" class="content-panel" style="display: none;">
    <div id="reportsList" class="panel-list">
        <div class="empty-message">加载中...</div>
    </div>
</div>
                <!-- 回收站面板 -->
                <div id="trashPanel" class="content-panel" style="display: none;">
                    <div id="trashListPanel" class="panel-list trash-list">
                        <div class="empty-message">加载中...</div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>

<!-- 全屏模态窗（新建/编辑表单） -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle"><i class="ri-edit-box-line"></i> 新建发布</h2>
        </div>
        <div class="modal-body-scroll">
            <form id="postForm">
<div id="publishFields">
    <!-- 日期和发布方式 (保持不变，置于选项卡上方) -->
    <div class="form-row">
        <div class="form-group form-group-date">
            <label><i class="ri-calendar-todo-line"></i> 发布日期</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group form-group-type">
            <label><i class="ri-send-plane-line"></i> 发布方式</label>
            <div class="type-selector">
                <label class="type-option"><input type="radio" name="publishType" value="immediate"> <i class="ri-flashlight-line"></i> 立即发布</label>
                <label class="type-option"><input type="radio" name="publishType" value="scheduled" checked> <i class="ri-alarm-line"></i> 定时发布</label>
            </div>
        </div>
    </div>

    <!-- 选项卡导航 -->
    <div class="publish-tabs">
        <button type="button" class="publish-tab-btn active" data-tab="music">
            <i class="ri-music-2-line"></i> 音乐
        </button>
        <button type="button" class="publish-tab-btn" data-tab="sentence">
            <i class="ri-double-quotes-l"></i> 句子
        </button>
        <button type="button" class="publish-tab-btn" data-tab="article">
            <i class="ri-article-line"></i> 文章
        </button>
    </div>

    <!-- 音乐面板 -->
    <div class="publish-tab-panel active" data-panel="music">
        <div class="form-row form-row-2col">
            <div class="form-group"><label>标题</label><input type="text" id="musicTitle" placeholder="如：Like A Star"></div>
            <div class="form-group"><label>艺术家</label><input type="text" id="musicArtist" placeholder="Youngso Kim"></div>
        </div>
        <div class="form-row form-row-2col">
            <div class="form-group"><label>封面URL</label><input type="url" id="musicCover" placeholder="https://..."></div>
            <div class="form-group"><label>音频URL</label><input type="url" id="musicSrc" placeholder="音频链接"></div>
        </div>
    </div>

    <!-- 句子面板 -->
    <div class="publish-tab-panel" data-panel="sentence">
        <div class="form-group"><label>内容</label><textarea id="sentenceText" class="auto-resize-textarea" placeholder="输入句子内容..."></textarea></div>
        <div class="form-row form-row-2col">
            <div class="form-group"><label>作者</label><input type="text" id="sentenceAuthor" placeholder="苏轼"></div>
            <div class="form-group"><label>配图URL</label><input type="url" id="sentenceImageUrl" placeholder="https://..."><div class="upload-preview" id="sentenceImagePreviewContainer" style="display:none"><img id="sentenceImagePreview"></div></div>
        </div>
    </div>

    <!-- 文章面板 -->
    <div class="publish-tab-panel" data-panel="article">
        <div class="form-row form-row-2col">
            <div class="form-group"><label>标题</label><input type="text" id="articleTitle" placeholder="我应该怎样活着"></div>
            <div class="form-group"><label>作者</label><input type="text" id="articleAuthor" placeholder="刘金增 等"></div>
        </div>
        <div class="form-group"><label>正文</label><textarea id="articleContent" class="auto-resize-textarea" placeholder="输入文章正文..."></textarea></div>
        <div class="form-group"><label>配图URL</label><input type="url" id="articleImageUrl" placeholder="https://..."><div class="upload-preview" id="imagePreviewContainer" style="display:none"><img id="imagePreview"></div></div>
    </div>
</div>
            </form>
        </div>
        <div class="form-actions">
            <button type="button" class="btn cancel" id="cancelFormBtn"><i class="ri-close-line"></i> 取消</button>
            <button type="button" class="btn btn-draft" id="saveDraftBtn"><i class="ri-save-line"></i> 保存草稿</button>
            <button type="button" class="btn btn-primary" id="submitFormBtn"><i class="ri-save-3-line"></i> 发布</button>
        </div>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="img/favicon.png" rel="icon">
    <title>Read.管理后台 | 内容发布中心</title>
    <link href="font/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 确保回收站面板与评论面板样式统一 */
        .trash-panel .trash-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .trash-panel .trash-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #eef2f6;
            transition: 0.2s;
        }
        .trash-panel .trash-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .trash-panel .trash-type-badge {
            background: #eef2ff;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e293b;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .trash-panel .trash-preview {
            font-size: 0.85rem;
            color: #334155;
            margin: 12px 0;
            background: #f8fafc;
            padding: 10px 14px;
            border-radius: 16px;
            word-break: break-word;
        }
        .trash-panel .trash-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 12px;
        }
        .trash-panel .trash-actions button {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .trash-panel .trash-actions button.restore-btn {
            background: #eef2ff;
            color: #2563eb;
            border-color: #cbd5e1;
        }
        .trash-panel .trash-actions button.permanent-btn {
            background: #fff1f0;
            color: #e11d48;
            border-color: #ffe4e2;
        }
        .trash-panel .empty-message {
            text-align: center;
            padding: 56px 20px;
            background: #ffffffcc;
            border-radius: 8px;
            color: #6c7a91;
            font-weight: 500;
        }
    </style>
</head>
<body>

<!-- 登录面板 -->
<div id="loginPanel" class="login-panel">
    <div class="login-card">
        <h2>Read. 管理后台</h2>
        <p class="login-sub">内容发布管理中心</p>
        <form id="loginForm">
            <div class="login-input-group">
                <i class="ri-user-3-line"></i>
                <input type="text" id="username" placeholder="用户名" autocomplete="off">
            </div>
            <div class="login-input-group">
                <i class="ri-lock-line"></i>
                <input type="password" id="password" placeholder="密码" autocomplete="off">
                <i class="ri-eye-off-line toggle-password" id="togglePassword"></i>
            </div>
            <button type="submit" class="login-btn">登录系统</button>
        </form>
    </div>
</div>

<!-- 主应用容器 -->
<div id="appContainer" class="app-container" style="display: none;">
    <div class="container">
        <div class="header">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="ri-menu-line"></i></button>
            <h1 id="mainHeaderTitle">已发布内容</h1>
            <div class="header-buttons">
                <button class="btn" id="newPostBtn"><i class="ri-add-line"></i> 新建发布</button>
                <button class="btn" id="trashBinBtn" style="background:#475569;"><i class="ri-delete-bin-7-line"></i> 回收站</button>
                <button class="btn" id="reportsHeaderBtn" style="background:#ef4444;"><i class="ri-alert-line"></i> 举报管理</button>
                <button class="btn" id="commentsHeaderBtn" style="background:#10b981;"><i class="ri-chat-3-line"></i> 评论管理</button>
                <button class="btn logout-btn" id="logoutBtn"><i class="ri-logout-box-line"></i> 退出</button>
            </div>
        </div>

        <!-- PC端顶部选项卡 -->
        <div class="tabs">
            <button id="tabPublished" class="active"><i class="ri-checkbox-circle-line"></i> 已发布</button>
            <button id="tabScheduled"><i class="ri-time-line"></i> 定时任务</button>
            <button id="tabDraft"><i class="ri-draft-line"></i> 草稿</button>
        </div>

        <!-- 已发布列表容器 -->
        <div id="postList" class="post-list"></div>
        <div id="scheduledList" class="post-list" style="display: none;"></div>
        <div id="draftList" class="post-list" style="display: none;"></div>
        
        <!-- 评论管理面板 -->
        <div id="commentsPanel" class="comments-panel" style="display: none;">
            <div id="commentsList" class="comments-list">
                <div class="empty-message">加载中...</div>
            </div>
        </div>

        <!-- 举报管理面板 -->
        <div id="reportsPanel" class="comments-panel" style="display: none;">
            <div id="reportsList" class="comments-list">
                <div class="empty-message">加载中...</div>
            </div>
        </div>

        <div id="trashPanel" class="comments-panel trash-panel" style="display: none;">
            <div class="trash-stats" style="margin-bottom: 20px; display: flex; justify-content: space-between;">
                <span><i class="ri-information-line"></i> 删除的内容暂存于此，可恢复</span>
                <span id="trashPanelCount">0 项</span>
            </div>
            <div id="trashListPanel" class="trash-list">
                <div class="empty-message">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 移动端右下角悬浮新增按钮 -->
    <div class="fab-container" id="mobileFabContainer">
        <div class="fab-btn" id="mobileFabBtn"><i class="ri-add-line"></i></div>
    </div>
</div>

<!-- 侧边栏 (移动端专属) -->
<div id="sidebarOverlay" class="sidebar-overlay"></div>
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <h3> Read.管理</h3>
        <button class="sidebar-close" id="sidebarCloseBtn"><i class="ri-close-line"></i></button>
    </div>
    <div class="sidebar-menu">
        <div class="sidebar-item" id="sidebarPublished">
            <i class="ri-rocket-line"></i> 已发布内容
        </div>
        <div class="sidebar-item" id="sidebarScheduled">
            <i class="ri-time-line"></i> 定时任务
        </div>
        <div class="sidebar-item" id="sidebarDraft">
            <i class="ri-draft-line"></i> 草稿箱
        </div>
        <div class="sidebar-item" id="sidebarComments">
            <i class="ri-chat-3-line"></i> 评论管理
        </div>
        <div class="sidebar-item" id="sidebarReports">
            <i class="ri-alert-line"></i> 举报管理
        </div>
        <div class="sidebar-item" id="sidebarTrash">
            <i class="ri-delete-bin-7-line"></i> 回收站
        </div>
    </div>
    <div class="sidebar-footer">
        <div class="sidebar-item" id="sidebarLogout">
            <i class="ri-logout-box-line"></i> 退出登录
        </div>
    </div>
</div>

<!-- 全屏模态窗 (新建/编辑表单) -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalTitle"><i class="ri-edit-box-line"></i> 新建发布</h2>
            <button class="modal-close" id="closeModalBtn"><i class="ri-close-line"></i></button>
        </div>
        <div class="modal-body-scroll">
            <form id="postForm">
                <div id="publishFields">
                    <div class="form-group"><label><i class="ri-calendar-todo-line"></i> 生效日期</label><input type="date" id="date" required></div>
                    <div class="type-selector">
                        <label><input type="radio" name="publishType" value="immediate"> <i class="ri-flashlight-line"></i> 立即发布</label>
                        <label><input type="radio" name="publishType" value="scheduled" checked> <i class="ri-alarm-line"></i> 定时发布</label>
                    </div>
                    <div class="section-title"><i class="ri-music-2-line"></i> 音乐模块</div>
                    <div class="form-group"><label>标题</label><input type="text" id="musicTitle" placeholder="如：Like A Star"></div>
                    <div class="form-group"><label>艺术家</label><input type="text" id="musicArtist" placeholder="Youngso Kim"></div>
                    <div class="form-group"><label>封面URL</label><input type="url" id="musicCover" placeholder="https://..."></div>
                    <div class="form-group"><label>音频URL</label><input type="url" id="musicSrc" placeholder="音频链接"></div>
                    <div class="section-title"><i class="ri-double-quotes-L"></i> 句子摘录</div>
                    <div class="form-group"><label>内容</label><textarea id="sentenceText" class="auto-resize-textarea"></textarea></div>
                    <div class="form-group"><label>作者</label><input type="text" id="sentenceAuthor" placeholder="苏轼"></div>
                    <div class="form-group"><label>配图URL</label><input type="url" id="sentenceImageUrl"><div class="upload-preview" id="sentenceImagePreviewContainer" style="display:none"><img id="sentenceImagePreview"></div></div>
                    <div class="section-title"><i class="ri-article-line"></i> 深度文章</div>
                    <div class="form-group"><label>标题</label><input type="text" id="articleTitle" placeholder="我应该怎样活着"></div>
                    <div class="form-group"><label>作者</label><input type="text" id="articleAuthor" placeholder="刘金增 等"></div>
                    <div class="form-group"><label>正文</label><textarea id="articleContent" class="auto-resize-textarea"></textarea></div>
                    <div class="form-group"><label>配图URL</label><input type="url" id="articleImageUrl"><div class="upload-preview" id="imagePreviewContainer" style="display:none"><img id="imagePreview"></div></div>
                </div>
            </form>
        </div>
        <div class="form-actions">
            <button type="button" class="btn cancel" id="cancelFormBtn"><i class="ri-close-line"></i> 取消</button>
            <button type="button" class="btn" id="saveDraftBtn" style="background:#f59e0b;"><i class="ri-save-line"></i> 保存草稿</button>
            <button type="button" class="btn" id="submitFormBtn"><i class="ri-save-3-line"></i> 保存发布</button>
        </div>
    </div>
</div>

<script src="js/script.js"></script>
<script>
    // 内联补充全局函数：侧边栏高亮及标题管理
    (function() {
        // 标题映射
        const headerTitleMap = {
            published: '已发布内容',
            scheduled: '定时任务',
            draft: '草稿箱',
            comments: '评论管理',
            reports: '举报管理',
            trash: '回收站'
        };
        window.updateMainHeader = function(moduleKey) {
            const titleEl = document.getElementById('mainHeaderTitle');
            if(titleEl && headerTitleMap[moduleKey]) {
                titleEl.innerText = headerTitleMap[moduleKey];
            }
        };
        // 全局关闭侧边栏
        window.closeSidebarGlobal = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if(sidebar) sidebar.classList.remove('open');
            if(overlay) overlay.classList.remove('active');
        };
    })();
</script>
</body>
</html>
